<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Inscription — DataClean</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="login-body">
<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <span class="brand-icon large">DC</span>
      <h1>Créer un compte</h1>
      <p>DataClean API — M1 IAGE</p>
    </div>
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="flash flash-{{ category }}">{{ message }}</div>
      {% endfor %}
    {% endwith %}
    <form method="POST" action="{{ url_for('auth.register') }}" class="auth-form">
      <div class="form-group">
        <label>Nom d'utilisateur</label>
        <input type="text" name="username" placeholder="Votre nom" required>
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" placeholder="votre@email.com" required>
      </div>
      <div class="form-group">
        <label>Mot de passe</label>
        <input type="password" name="password" placeholder="Minimum 6 caractères" required>
      </div>
      <div class="form-group">
        <label>Confirmer le mot de passe</label>
        <input type="password" name="confirm" placeholder="••••••••" required>
      </div>
      <button type="submit" class="run-btn">Créer mon compte</button>
    </form>
    <p class="login-note">
      Déjà un compte ?
      <a href="{{ url_for('auth.login') }}" style="color:var(--accent);">Se connecter</a>
    </p>
  </div>
</div>
</body>
</html>
